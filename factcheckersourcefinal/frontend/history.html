<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcademiCheck — History</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; }
        header {
            background: #1a1a2e; color: white; padding: 20px 40px;
            display: flex; align-items: center; gap: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        header h1 { font-size: 1.6rem; font-weight: 700; }
        header p { font-size: 0.85rem; color: #a0aec0; margin-top: 2px; }
        .nav { display: flex; gap: 12px; margin-left: auto; }
        .nav a {
            color: #a0aec0; text-decoration: none; font-size: 0.9rem;
            padding: 6px 14px; border-radius: 6px; border: 1px solid #3a3a5e;
            transition: all 0.2s;
        }
        .nav a:hover { color: white; border-color: white; }
        main { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        h2 { font-size: 1.2rem; margin-bottom: 20px; }
        .empty { text-align: center; padding: 60px; color: #718096; }
        .report-card {
            background: white; border-radius: 12px; padding: 20px 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 14px;
            display: flex; justify-content: space-between; align-items: center;
            gap: 16px; cursor: pointer; transition: box-shadow 0.2s;
            text-decoration: none; color: inherit;
        }
        .report-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.14); }
        .report-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 4px; }
        .report-meta { font-size: 0.8rem; color: #718096; }
        .report-stats { display: flex; gap: 10px; flex-shrink: 0; }
        .stat-pill {
            padding: 4px 10px; border-radius: 20px;
            font-size: 0.75rem; font-weight: 700;
        }
        .pill-supported { background: #d1fae5; color: #065f46; }
        .pill-contradicted { background: #fee2e2; color: #991b1b; }
        .pill-unverifiable { background: #fef3c7; color: #92400e; }
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: 100;
            overflow-y: auto; padding: 40px 20px;
        }
        .modal {
            background: white; border-radius: 16px; max-width: 860px;
            margin: 0 auto; padding: 32px;
        }
        .modal-header {
            display: flex; justify-content: space-between;
            align-items: flex-start; margin-bottom: 24px; gap: 16px;
        }
        .modal-title { font-size: 1.1rem; font-weight: 700; }
        .modal-meta { font-size: 0.8rem; color: #718096; margin-top: 4px; }
        .close-btn {
            background: #f0f2f5; border: none; border-radius: 8px;
            padding: 8px 14px; cursor: pointer; font-size: 0.85rem;
            font-weight: 600; flex-shrink: 0;
        }
        .claim-card {
            border-radius: 10px; padding: 18px; margin-bottom: 12px;
            border-left: 4px solid #e2e8f0;
        }
        .claim-card.supported { border-left-color: #10b981; background: #f0fdf4; }
        .claim-card.contradicted { border-left-color: #ef4444; background: #fff5f5; }
        .claim-card.unverifiable { border-left-color: #f59e0b; background: #fffbeb; }
        .claim-text { font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; }
        .claim-verdict {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 3px 10px; border-radius: 20px; font-size: 0.75rem;
            font-weight: 700; margin-bottom: 8px;
        }
        .verdict-supported { background: #d1fae5; color: #065f46; }
        .verdict-contradicted { background: #fee2e2; color: #991b1b; }
        .verdict-unverifiable { background: #fef3c7; color: #92400e; }
        .claim-explanation { font-size: 0.85rem; color: #4a5568; line-height: 1.6; }
        .source-item {
            background: white; border-radius: 6px; padding: 8px 12px;
            margin-top: 8px; font-size: 0.78rem; border: 1px solid #e2e8f0;
        }
        .source-title { font-weight: 600; color: #2d3748; }
        .source-meta { color: #718096; }
        footer { text-align: center; padding: 30px; color: #a0aec0; font-size: 0.8rem; }
    </style>
</head>
<body>
<header>
    <div>
        <h1>AcademiCheck</h1>
        <p>Fact-check history</p>
    </div>
    <nav class="nav">
        <a href="/">New Check</a>
    </nav>
</header>

<main>
    <h2>Previous Fact-Checks</h2>
    <div id="reportList"><div class="empty">Loading...</div></div>
</main>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" id="modal">
        <div class="modal-header">
            <div>
                <div class="modal-title" id="modalTitle"></div>
                <div class="modal-meta" id="modalMeta"></div>
            </div>
            <button class="close-btn" onclick="closeModalBtn()">Close</button>
        </div>
        <div id="modalBody"></div>
    </div>
</div>

<footer>AcademiCheck &mdash; Final Year Project</footer>

<script>
    async function loadHistory() {
        const res = await fetch('/history');
        const reports = await res.json();
        const list = document.getElementById('reportList');

        if (!reports.length) {
            list.innerHTML = '<div class="empty">No fact-checks yet. <a href="/">Run your first check →</a></div>';
            return;
        }

        list.innerHTML = reports.map(r => `
            <div class="report-card" onclick="openReport('${r.id}')">
                <div>
                    <div class="report-title">
                        ${r.article_title || 'Untitled article'}
                    </div>
                    <div class="report-meta">
                        ${r.total_claims} claims &bull;
                        ${new Date(r.created_at).toLocaleString()}
                    </div>
                </div>
                <div class="report-stats">
                    <span class="stat-pill pill-supported">✅ ${r.supported}</span>
                    <span class="stat-pill pill-contradicted">❌ ${r.contradicted}</span>
                    <span class="stat-pill pill-unverifiable">⚠️ ${r.unverifiable}</span>
                </div>
            </div>
        `).join('');
    }

    async function openReport(id) {
        const res = await fetch(`/history/${id}`);
        const report = await res.json();

        document.getElementById('modalTitle').textContent =
            report.article_title || 'Untitled article';
        document.getElementById('modalMeta').textContent =
            `${report.total_claims} claims · ${new Date(report.created_at).toLocaleString()}`;

        document.getElementById('modalBody').innerHTML = report.results.map(r => {
            const cls = r.verdict.toLowerCase();
            const emoji = { SUPPORTED: '✅', CONTRADICTED: '❌', UNVERIFIABLE: '⚠️' }[r.verdict] || '❓';
            const sources = r.sources.slice(0, 2).map(s => `
                <div class="source-item">
                    <div class="source-title">${s.title || 'Unknown'}</div>
                    <div class="source-meta">${s.authors || ''} ${s.year ? `(${s.year})` : ''}</div>
                </div>
            `).join('');

            return `
                <div class="claim-card ${cls}">
                    <div class="claim-text">${r.claim}</div>
                    <div class="claim-verdict verdict-${cls}">${emoji} ${r.verdict} · ${Math.round(r.confidence * 100)}% confidence</div>
                    <div class="claim-explanation">${r.explanation}</div>
                    ${sources}
                </div>`;
        }).join('');

        document.getElementById('modalOverlay').style.display = 'block';
    }

    function closeModal(e) {
        if (e.target === document.getElementById('modalOverlay')) closeModalBtn();
    }

    function closeModalBtn() {
        document.getElementById('modalOverlay').style.display = 'none';
    }

    loadHistory();
</script>
</body>
</html>
